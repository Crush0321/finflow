<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财经新闻热点 - 智能爬取平台</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #3b82f6; --bg-dark: #0f172a; --card-bg: #1e293b; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; color: #e2e8f0; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-push { background: linear-gradient(135deg, #10b981 0%, #059669 100%); transition: all 0.3s ease; }
        .btn-push:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4); }
        .btn-push:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-trending { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); transition: all 0.3s ease; }
        .btn-trending:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4); }
        .btn-trending:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .news-card { background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .news-card:hover { background: rgba(30, 41, 59, 0.9); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); }
        .source-badge { font-size: 0.75rem; padding: 0.25rem 0.75rem; border-radius: 9999px; font-weight: 600; }
        .source-eastmoney { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
        .source-sina { background: rgba(59, 130, 246, 0.2); color: #93c5fd; }
        .source-cls { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
        .source-36kr { background: rgba(139, 92, 246, 0.2); color: #c4b5fd; }
        .source-jiemian { background: rgba(236, 72, 153, 0.2); color: #f9a8d4; }
        .source-huxiu { background: rgba(245, 158, 11, 0.2); color: #fcd34d; }
        
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .content-preview { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(30, 41, 59, 0.5); }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .tab-active { background: rgba(59, 130, 246, 0.3); border-color: #3b82f6; color: #60a5fa; }
        .tab-inactive { background: rgba(30, 41, 59, 0.5); border-color: transparent; color: #94a3b8; }
        .tab-inactive:hover { background: rgba(59, 130, 246, 0.1); color: #cbd5e1; }
    </style>
</head>
<body>
    <header class="glass-card sticky top-0 z-50 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center">
                        <i class="fas fa-chart-line text-white text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">财经新闻热点</h1>
                        <p class="text-xs text-gray-400">智能爬取 · 实时分析</p>
                    </div>
                </div>
                <div class="text-sm text-gray-400">
                    <i class="far fa-calendar-alt mr-1"></i>
                    <span id="currentDate"></span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- 模式切换标签 -->
        <div class="glass-card rounded-xl p-2 mb-6">
            <div class="flex space-x-2">
                <button id="tabFinance" onclick="switchMode('finance')" class="tab-active flex-1 py-2 px-4 rounded-lg font-medium text-sm transition">
                    <i class="fas fa-chart-bar mr-2"></i>财经资讯
                </button>
                <button id="tabTrending" onclick="switchMode('trending')" class="tab-inactive flex-1 py-2 px-4 rounded-lg font-medium text-sm transition">
                    <i class="fas fa-fire mr-2"></i>消费趋势 <span class="text-xs opacity-70">(银发/单身)</span>
                </button>
            </div>
        </div>

        <!-- 控制面板 -->
        <div class="glass-card rounded-xl p-6 mb-6">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex flex-col gap-3">
                    <!-- 数据源选择 -->
                    <div class="flex items-center gap-3">
                        <span class="text-sm text-gray-400 font-medium">数据源:</span>
                        <select id="sourceSelect" class="bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm">
                            <option value="all">全部来源</option>
                            <optgroup label="财经媒体" id="financeGroup">
                                <option value="eastmoney">东方财富</option>
                                <option value="sina">新浪财经</option>
                                <option value="cls">财联社</option>
                            </optgroup>
                            <optgroup label="消费趋势" id="trendingGroup">
                                <option value="36kr">36氪</option>
                                <option value="jiemian">界面新闻</option>
                                
                            </optgroup>
                        </select>
                    </div>
                    
                    <!-- 财经模式按钮 -->
                    <div id="financeButtons" class="flex items-center gap-3">
                        <button id="crawlBtn" onclick="startCrawl()" class="btn-primary px-5 py-2 rounded-lg font-medium flex items-center space-x-2">
                            <i class="fas fa-spider"></i>
                            <span>一键爬取</span>
                        </button>
                        
                        <button id="pushBtn" onclick="startPush()" class="btn-push px-5 py-2 rounded-lg font-medium flex items-center space-x-2 text-white">
                            <i class="fas fa-paper-plane"></i>
                            <span>推送日报</span>
                        </button>
                        
                        <button onclick="loadNews()" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg text-sm transition flex items-center space-x-2">
                            <i class="fas fa-sync-alt"></i>
                            <span>刷新</span>
                        </button>
                    </div>
                    
                    <!-- 趋势模式按钮 -->
                    <div id="trendingButtons" class="hidden flex items-center gap-3">
                        <button id="crawlTrendingBtn" onclick="startCrawlTrending()" class="btn-trending px-5 py-2 rounded-lg font-medium flex items-center space-x-2 text-white">
                            <i class="fas fa-fire"></i>
                            <span>爬取趋势</span>
                        </button>
                        
                        <button id="pushTrendingBtn" onclick="startPushTrending()" class="btn-trending px-5 py-2 rounded-lg font-medium flex items-center space-x-2 text-white border border-amber-500/30">
                            <i class="fas fa-paper-plane"></i>
                            <span>推送趋势日报</span>
                        </button>
                        
                        <button onclick="loadNews()" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg text-sm transition flex items-center space-x-2">
                            <i class="fas fa-sync-alt"></i>
                            <span>刷新</span>
                        </button>
                    </div>
                </div>
                
                <div class="flex flex-col gap-3">
                    <!-- 日期选择 -->
                    <div class="flex items-center gap-3">
                        <span class="text-sm text-gray-400 font-medium">日期:</span>
                        <select id="dateSelect" class="bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm w-40">
                            {% for date in dates %}
                            <option value="{{ date }}" {% if date == today %}selected{% endif %}>{{ date[:4] }}-{{ date[4:6] }}-{{ date[6:] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <!-- 搜索框 -->
                    <div class="flex items-center gap-3">
                        <span class="text-sm text-gray-400 font-medium">搜索:</span>
                        <div class="relative">
                            <input type="text" id="searchInput" placeholder="搜索关键词..." 
                                class="bg-gray-800 border border-gray-600 rounded-lg pl-9 pr-4 py-2 text-sm w-40"
                                onkeypress="if(event.key==='Enter') loadNews()">
                            <i class="fas fa-search absolute left-3 top-2.5 text-gray-500"></i>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 状态消息 -->
            <div id="statusMessage" class="mt-4 text-sm hidden"></div>
        </div>

        <!-- 统计卡片 - 财经模式 -->
        <div id="financeStats" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="glass-card rounded-xl p-4">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-xs">总新闻数</p>
                        <p id="statTotal" class="text-2xl font-bold text-white">0</p>
                    </div>
                    <div class="w-10 h-10 rounded-lg bg-blue-500/20 flex items-center justify-center">
                        <i class="fas fa-newspaper text-blue-400"></i>
                    </div>
                </div>
            </div>
            
            <div class="glass-card rounded-xl p-4">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-xs">东方财富</p>
                        <p id="statEastmoney" class="text-2xl font-bold text-red-400">0</p>
                    </div>
                    <div class="w-10 h-10 rounded-lg bg-red-500/20 flex items-center justify-center">
                        <i class="fas fa-chart-pie text-red-400"></i>
                    </div>
                </div>
            </div>
            
            <div class="glass-card rounded-xl p-4">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-xs">新浪财经</p>
                        <p id="statSina" class="text-2xl font-bold text-blue-400">0</p>
                    </div>
                    <div class="w-10 h-10 rounded-lg bg-blue-500/20 flex items-center justify-center">
                        <i class="fas fa-globe text-blue-400"></i>
                    </div>
                </div>
            </div>
            
            <div class="glass-card rounded-xl p-4">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-xs">财联社</p>
                        <p id="statCls" class="text-2xl font-bold text-green-400">0</p>
                    </div>
                    <div class="w-10 h-10 rounded-lg bg-green-500/20 flex items-center justify-center">
                        <i class="fas fa-bolt text-green-400"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- 统计卡片 - 趋势模式 -->
        <div id="trendingStats" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 hidden">
            <div class="glass-card rounded-xl p-4">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-xs">趋势相关</p>
                        <p id="statTrendingTotal" class="text-2xl font-bold text-white">0</p>
                    </div>
                    <div class="w-10 h-10 rounded-lg bg-amber-500/20 flex items-center justify-center">
                        <i class="fas fa-fire text-amber-400"></i>
                    </div>
                </div>
            </div>
            
            <div class="glass-card rounded-xl p-4">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-xs">36氪</p>
                        <p id="stat36kr" class="text-2xl font-bold text-purple-400">0</p>
                    </div>
                    <div class="w-10 h-10 rounded-lg bg-purple-500/20 flex items-center justify-center">
                        <i class="fas fa-rocket text-purple-400"></i>
                    </div>
                </div>
            </div>
            
            <div class="glass-card rounded-xl p-4">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-xs">界面新闻</p>
                        <p id="statJiemian" class="text-2xl font-bold text-pink-400">0</p>
                    </div>
                    <div class="w-10 h-10 rounded-lg bg-pink-500/20 flex items-center justify-center">
                        <i class="fas fa-newspaper text-pink-400"></i>
                    </div>
                </div>
            </div>
            
            <div class="glass-card rounded-xl p-4">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-xs">虎嗅</p>
                        <p id="statHuxiu" class="text-2xl font-bold text-amber-400">0</p>
                    </div>
                    <div class="w-10 h-10 rounded-lg bg-amber-500/20 flex items-center justify-center">
                        <i class="fas fa-eye text-amber-400"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- 新闻列表 -->
        <div id="newsContainer" class="grid grid-cols-1 gap-4">
            <div class="glass-card rounded-xl p-12 text-center">
                <i class="fas fa-inbox text-4xl text-gray-600 mb-4"></i>
                <p class="text-gray-400">点击"一键爬取"获取今日热点新闻</p>
            </div>
        </div>
    </main>

    <!-- 详情弹窗 -->
    <div id="detailModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="absolute inset-4 md:inset-10 glass-card rounded-xl overflow-hidden flex flex-col">
            <div class="flex items-center justify-between p-4 border-b border-gray-700">
                <div class="flex items-center space-x-3">
                    <span id="modalSource" class="source-badge"></span>
                    <span id="modalTime" class="text-sm text-gray-400"></span>
                </div>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-6">
                <h2 id="modalTitle" class="text-2xl font-bold mb-4"></h2>
                <div id="modalContent" class="text-gray-300 leading-relaxed whitespace-pre-wrap"></div>
            </div>
            <div class="p-4 border-t border-gray-700 flex justify-between items-center">
                <a id="modalLink" href="#" target="_blank" class="text-blue-400 hover:text-blue-300 text-sm flex items-center">
                    <i class="fas fa-external-link-alt mr-1"></i> 查看原文
                </a>
                <button onclick="copyContent()" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg text-sm">
                    <i class="fas fa-copy mr-1"></i> 复制
                </button>
            </div>
        </div>
    </div>

    <script>
        // 设置当前日期
        const now = new Date();
        document.getElementById('currentDate').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
        
        let currentNews = [];
        let currentMode = 'finance';
        
        // 切换模式
        function switchMode(mode) {
            currentMode = mode;
            const financeTab = document.getElementById('tabFinance');
            const trendingTab = document.getElementById('tabTrending');
            const financeButtons = document.getElementById('financeButtons');
            const trendingButtons = document.getElementById('trendingButtons');
            const financeStats = document.getElementById('financeStats');
            const trendingStats = document.getElementById('trendingStats');
            const financeGroup = document.getElementById('financeGroup');
            const trendingGroup = document.getElementById('trendingGroup');
            const sourceSelect = document.getElementById('sourceSelect');
            
            if (mode === 'finance') {
                financeTab.className = 'tab-active flex-1 py-2 px-4 rounded-lg font-medium text-sm transition';
                trendingTab.className = 'tab-inactive flex-1 py-2 px-4 rounded-lg font-medium text-sm transition';
                financeButtons.classList.remove('hidden');
                trendingButtons.classList.add('hidden');
                financeStats.classList.remove('hidden');
                trendingStats.classList.add('hidden');
                
                // 显示财经分组，隐藏趋势分组
                financeGroup.style.display = '';
                trendingGroup.style.display = 'none';
            } else {
                financeTab.className = 'tab-inactive flex-1 py-2 px-4 rounded-lg font-medium text-sm transition';
                trendingTab.className = 'tab-active flex-1 py-2 px-4 rounded-lg font-medium text-sm transition';
                financeButtons.classList.add('hidden');
                trendingButtons.classList.remove('hidden');
                financeStats.classList.add('hidden');
                trendingStats.classList.remove('hidden');
                
                // 隐藏财经分组，显示趋势分组
                financeGroup.style.display = 'none';
                trendingGroup.style.display = '';
            }
            
            // 重置数据源选择
            sourceSelect.value = 'all';
            loadNews();
        }
        
        // 开始爬取（同步等待）
        async function startCrawl() {
            const btn = document.getElementById('crawlBtn');
            const statusMsg = document.getElementById('statusMessage');
            const source = document.getElementById('sourceSelect').value;
            
            // 禁用按钮，显示加载中
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner loading-spinner"></i><span>爬取中，请稍候...</span>';
            statusMsg.classList.remove('hidden');
            statusMsg.innerHTML = '<span class="text-blue-400"><i class="fas fa-spinner fa-spin mr-2"></i>正在爬取新闻数据，请稍候...</span>';
            
            try {
                // 发送请求，等待完成
                const res = await fetch('/api/crawl', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({source})
                });
                
                const data = await res.json();
                
                // 恢复按钮
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-spider"></i><span>一键爬取</span>';
                
                if (data.success) {
                    // 显示成功
                    statusMsg.innerHTML = `
                        <div class="flex items-center text-green-400">
                            <i class="fas fa-check-circle mr-2"></i>
                            <span>爬取完成！共 ${data.total} 条新闻</span>
                        </div>
                    `;
                    // 自动加载今天的新闻
                    document.getElementById('dateSelect').value = new Date().toISOString().slice(0,10).replace(/-/g,'');
                    loadNews();
                } else {
                    statusMsg.innerHTML = `
                        <div class="flex items-center text-red-400">
                            <i class="fas fa-exclamation-circle mr-2"></i>
                            <span>爬取失败: ${data.error}</span>
                        </div>
                    `;
                }
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-spider"></i><span>一键爬取</span>';
                statusMsg.innerHTML = `
                    <div class="flex items-center text-red-400">
                        <i class="fas fa-exclamation-circle mr-2"></i>
                        <span>请求失败: ${err.message}</span>
                    </div>
                `;
            }
        }
        
        // 爬取消费趋势
        async function startCrawlTrending() {
            const btn = document.getElementById('crawlTrendingBtn');
            const statusMsg = document.getElementById('statusMessage');
            
            // 禁用按钮，显示加载中
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner loading-spinner"></i><span>爬取趋势中...</span>';
            statusMsg.classList.remove('hidden');
            statusMsg.innerHTML = '<span class="text-amber-400"><i class="fas fa-spinner fa-spin mr-2"></i>正在爬取消费趋势新闻（银发/单身经济）...</span>';
            
            try {
                const res = await fetch('/api/crawl/trending', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });
                
                const data = await res.json();
                
                // 恢复按钮
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-fire"></i><span>爬取趋势</span>';
                
                if (data.success) {
                    statusMsg.innerHTML = `
                        <div class="flex items-center text-green-400">
                            <i class="fas fa-check-circle mr-2"></i>
                            <span>${data.message}！共 ${data.total} 条新闻</span>
                        </div>
                    `;
                    document.getElementById('dateSelect').value = new Date().toISOString().slice(0,10).replace(/-/g,'');
                    loadNews();
                } else {
                    statusMsg.innerHTML = `
                        <div class="flex items-center text-red-400">
                            <i class="fas fa-exclamation-circle mr-2"></i>
                            <span>爬取失败: ${data.error}</span>
                        </div>
                    `;
                }
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-fire"></i><span>爬取趋势</span>';
                statusMsg.innerHTML = `
                    <div class="flex items-center text-red-400">
                        <i class="fas fa-exclamation-circle mr-2"></i>
                        <span>请求失败: ${err.message}</span>
                    </div>
                `;
            }
        }
        
        // 加载新闻列表
        async function loadNews() {
            const date = document.getElementById('dateSelect').value;
            const source = document.getElementById('sourceSelect').value;
            const keyword = document.getElementById('searchInput').value;
            const container = document.getElementById('newsContainer');
            
            container.innerHTML = `
                <div class="glass-card rounded-xl p-12 text-center">
                    <i class="fas fa-spinner fa-spin text-3xl text-blue-400 mb-4"></i>
                    <p class="text-gray-400">加载中...</p>
                </div>
            `;
            
            try {
                const params = new URLSearchParams({date, source, keyword});
                const res = await fetch(`/api/news?${params}`);
                const data = await res.json();
                
                currentNews = data.news || [];
                
                // 更新统计
                updateStats(currentNews);
                
                // 渲染列表
                if (currentNews.length === 0) {
                    container.innerHTML = `
                        <div class="glass-card rounded-xl p-12 text-center">
                            <i class="fas fa-inbox text-4xl text-gray-600 mb-4"></i>
                            <p class="text-gray-400">暂无数据</p>
                            ${currentMode === 'trending' ? '<p class="text-gray-500 text-sm mt-2">消费趋势模式只显示银发经济/单身经济相关内容</p>' : ''}
                        </div>
                    `;
                } else {
                    container.innerHTML = currentNews.map((news, index) => `
                        <div class="news-card rounded-xl p-5" onclick="showDetail('${news.id}')">
                            <div class="flex items-start justify-between gap-4">
                                <div class="flex-1">
                                    <div class="flex items-center gap-2 mb-2">
                                        <span class="source-badge source-${getSourceClass(news.source)}">${news.source}</span>
                                        <span class="text-xs text-gray-500">${news.pub_time || ''}</span>
                                    </div>
                                    <h3 class="font-semibold text-lg mb-2 text-white hover:text-blue-400 transition cursor-pointer">${news.title}</h3>
                                    <p class="text-gray-400 text-sm content-preview">${news.content ? news.content.substring(0, 200) + '...' : '暂无内容'}</p>
                                </div>
                                <div class="flex-shrink-0">
                                    <i class="fas fa-chevron-right text-gray-600"></i>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                container.innerHTML = `
                    <div class="glass-card rounded-xl p-12 text-center text-red-400">
                        <i class="fas fa-exclamation-circle text-3xl mb-4"></i>
                        <p>加载失败: ${err.message}</p>
                    </div>
                `;
            }
        }
        
        // 推送日报
        async function startPush() {
            const btn = document.getElementById('pushBtn');
            const statusMsg = document.getElementById('statusMessage');
            
            // 检查是否有数据
            if (currentNews.length === 0) {
                statusMsg.classList.remove('hidden');
                statusMsg.innerHTML = `
                    <div class="flex items-center text-yellow-400">
                        <i class="fas fa-exclamation-triangle mr-2"></i>
                        <span>请先爬取新闻数据</span>
                    </div>
                `;
                return;
            }
            
            // 禁用按钮，显示加载中
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner loading-spinner"></i><span>推送中...</span>';
            statusMsg.classList.remove('hidden');
            statusMsg.innerHTML = '<span class="text-blue-400"><i class="fas fa-spinner fa-spin mr-2"></i>正在生成AI日报并推送到企业微信，请稍候...</span>';
            
            try {
                // 发送请求
                const res = await fetch('/api/push', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });
                
                const data = await res.json();
                
                // 恢复按钮
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i><span>推送日报</span>';
                
                if (data.success) {
                    statusMsg.innerHTML = `
                        <div class="flex items-center text-green-400">
                            <i class="fas fa-check-circle mr-2"></i>
                            <span>${data.message}</span>
                        </div>
                        <div class="mt-2 p-3 bg-gray-800 rounded text-gray-300 text-xs">
                            ${data.summary}
                        </div>
                    `;
                } else {
                    statusMsg.innerHTML = `
                        <div class="flex items-center text-red-400">
                            <i class="fas fa-exclamation-circle mr-2"></i>
                            <span>推送失败: ${data.error}</span>
                        </div>
                    `;
                }
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i><span>推送日报</span>';
                statusMsg.innerHTML = `
                    <div class="flex items-center text-red-400">
                        <i class="fas fa-exclamation-circle mr-2"></i>
                        <span>请求失败: ${err.message}</span>
                    </div>
                `;
            }
        }
        
        // 推送消费趋势日报
        async function startPushTrending() {
            const btn = document.getElementById('pushTrendingBtn');
            const statusMsg = document.getElementById('statusMessage');
            
            // 检查是否有数据
            if (currentNews.length === 0) {
                statusMsg.classList.remove('hidden');
                statusMsg.innerHTML = `
                    <div class="flex items-center text-yellow-400">
                        <i class="fas fa-exclamation-triangle mr-2"></i>
                        <span>请先爬取消费趋势新闻</span>
                    </div>
                `;
                return;
            }
            
            // 禁用按钮，显示加载中
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner loading-spinner"></i><span>推送趋势日报...</span>';
            statusMsg.classList.remove('hidden');
            statusMsg.innerHTML = '<span class="text-amber-400"><i class="fas fa-spinner fa-spin mr-2"></i>正在生成消费趋势日报并推送...</span>';
            
            try {
                const res = await fetch('/api/push/trending', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });
                
                const data = await res.json();
                
                // 恢复按钮
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i><span>推送趋势日报</span>';
                
                if (data.success) {
                    statusMsg.innerHTML = `
                        <div class="flex items-center text-green-400">
                            <i class="fas fa-check-circle mr-2"></i>
                            <span>${data.message}</span>
                        </div>
                        <div class="mt-2 p-3 bg-gray-800 rounded text-gray-300 text-xs">
                            ${data.summary}
                        </div>
                    `;
                } else {
                    statusMsg.innerHTML = `
                        <div class="flex items-center text-red-400">
                            <i class="fas fa-exclamation-circle mr-2"></i>
                            <span>推送失败: ${data.error}</span>
                        </div>
                    `;
                }
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i><span>推送趋势日报</span>';
                statusMsg.innerHTML = `
                    <div class="flex items-center text-red-400">
                        <i class="fas fa-exclamation-circle mr-2"></i>
                        <span>请求失败: ${err.message}</span>
                    </div>
                `;
            }
        }
        
        // 更新统计
        function updateStats(news) {
            // 财经统计
            document.getElementById('statTotal').textContent = news.length;
            document.getElementById('statEastmoney').textContent = news.filter(n => n.source === '东方财富').length;
            document.getElementById('statSina').textContent = news.filter(n => n.source === '新浪财经').length;
            document.getElementById('statCls').textContent = news.filter(n => n.source === '财联社').length;
            
            // 趋势统计
            const trendingKeywords = ['银发', '养老', '老年', '老龄', '退休', '养老产业', '适老',
                '单身', '独居', '一人经济', '单身经济', '独居生活', '一人食', '迷你',
                '新消费', '消费趋势', '宠物经济', '情绪价值', '悦己消费'];
            const trendingNews = news.filter(n => {
                const text = (n.title + ' ' + n.content).toLowerCase();
                return trendingKeywords.some(kw => text.includes(kw.toLowerCase()));
            });
            
            document.getElementById('statTrendingTotal').textContent = trendingNews.length;
            document.getElementById('stat36kr').textContent = news.filter(n => n.source === '36氪').length;
            document.getElementById('statJiemian').textContent = news.filter(n => n.source === '界面新闻').length;
            document.getElementById('statHuxiu').textContent = news.filter(n => n.source === '虎嗅').length;
        }
        
        // 获取来源样式
        function getSourceClass(source) {
            const map = {
                '东方财富': 'eastmoney', 
                '新浪财经': 'sina', 
                '财联社': 'cls',
                '36氪': '36kr',
                '界面新闻': 'jiemian',
                '虎嗅': 'huxiu',
            };
            return map[source] || 'eastmoney';
        }
        
        // 显示详情
        function showDetail(newsId) {
            const news = currentNews.find(n => n.id === newsId);
            if (!news) return;
            
            document.getElementById('modalTitle').textContent = news.title;
            document.getElementById('modalContent').textContent = news.content || '暂无内容';
            document.getElementById('modalLink').href = news.url;
            document.getElementById('modalTime').textContent = news.pub_time || '';
            
            const badge = document.getElementById('modalSource');
            badge.textContent = news.source;
            badge.className = `source-badge source-${getSourceClass(news.source)}`;
            
            document.getElementById('detailModal').classList.remove('hidden');
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }
        
        // 复制内容
        function copyContent() {
            const text = document.getElementById('modalContent').textContent;
            navigator.clipboard.writeText(text).then(() => alert('已复制'));
        }
        
        // 监听日期变化
        document.getElementById('dateSelect').addEventListener('change', loadNews);
        
        // 页面加载完成后加载数据
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化下拉框分组显示
            const financeGroup = document.getElementById('financeGroup');
            const trendingGroup = document.getElementById('trendingGroup');
            if (currentMode === 'finance') {
                financeGroup.style.display = '';
                trendingGroup.style.display = 'none';
            } else {
                financeGroup.style.display = 'none';
                trendingGroup.style.display = '';
            }
            loadNews();
        });
    </script>
</body>
</html>
